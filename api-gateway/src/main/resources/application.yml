server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true

      routes:
        - id: iam-service
          uri: lb://IAM-SERVICE
          predicates:
            - Path=/api/iam/**
          filters:
            - StripPrefix=2
        - id: storage-service
          uri: lb://STORAGE-SERVICE
          predicates:
            - Path=/api/storage/**
          filters:
           - StripPrefix=2

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    urls:
      - name: iam-service
        url: /api/iam/v3/api-docs
      - name: storage-service
        url: /api/storage/v3/api-docs

logging:
  level:
    org.springframework.cloud.gateway: DEBUG