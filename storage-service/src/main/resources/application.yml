server:
  port: 8082

spring:
  application:
    name: STORAGE-SERVICE

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
resilience4j:
  retry:
    instances:
      iamService:
        max-attempts: 3
        wait-duration: 500ms

  circuitbreaker:
    instances:
      iamService:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s